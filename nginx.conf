server {
    listen 80 default_server;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # --- Security headers (applied to every response, including errors) ---
    # TLS is terminated at the reverse proxy (Traefik/Dokploy); HSTS is set
    # there too. The headers below are belt-and-braces from nginx itself.
    add_header X-Frame-Options "DENY" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header X-Robots-Tag "noindex, nofollow" always;
    add_header Permissions-Policy "camera=(), microphone=(), geolocation=(), interest-cohort=()" always;
    # CSP — adjust connect-src if API/auth host changes. recharts/Radix need
    # inline styles; Vite emits hashed JS so 'unsafe-inline' is NOT allowed for scripts.
    add_header Content-Security-Policy "default-src 'self'; script-src 'self'; style-src 'self' 'unsafe-inline'; img-src 'self' data: blob: https:; font-src 'self' data:; connect-src 'self' https://api.reinigungs-portal.com wss://api.reinigungs-portal.com; frame-ancestors 'none'; base-uri 'self'; form-action 'self'; object-src 'none'" always;

    # gzip for text assets
    gzip on;
    gzip_types text/plain text/css application/json application/javascript application/manifest+json image/svg+xml;
    gzip_min_length 1024;

    # Long cache for hashed assets; never cache the service worker / manifest / index
    location /assets/ {
        access_log off;
        expires 1y;
        add_header Cache-Control "public, immutable";
        try_files $uri =404;
    }

    location = /sw.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }
    location = /registerSW.js {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        try_files $uri =404;
    }
    location = /index.html {
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }
}
